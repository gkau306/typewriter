<!DOCTYPE html><html lang="en" style="--paper: #f4ebd6; --paper-shadow: #d9ccac;"><head>


<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Clatter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&amp;family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #6b0f1f;
    --bg-deep: #4a0a14;
    --paper: #f4ebd6;
    --paper-shadow: #d9ccac;
    --ink: #1a1512;
    --ink-soft: rgba(255, 244, 232, 0.78);
    --heading: #fff5eb;
    --ribbon-red: #8a2a1f;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Cormorant Garamond", Georgia, serif;
    color: var(--heading);
    background: var(--bg);
    background-image:
      radial-gradient(ellipse 90% 70% at 50% -10%, rgba(255, 180, 190, 0.18), transparent 55%),
      radial-gradient(ellipse 80% 50% at 50% 120%, rgba(0, 0, 0, 0.22), transparent 55%),
      linear-gradient(180deg, var(--bg) 0%, var(--bg-deep) 100%);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .scene { position: relative; max-width: 1180px; margin: 0 auto; padding: 28px 32px 80px; }

  .page-title {
    font-family: "Cormorant Garamond", serif;
    font-weight: 600;
    font-size: clamp(26px, 3.2vw, 36px);
    letter-spacing: 0.02em;
    color: var(--heading);
    text-align: center;
    margin: 0 0 28px;
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.35);
  }

  /* Stage holds paper + typewriter image */
  .stage {
    position: relative;
    margin: 360px auto 0;
    width: min(760px, 100%);
    isolation: isolate;
  }

  /* Paper floats up from behind the platen.
     Platen top in photo is at ~14% of image height → paper bottom sits ~14% from top of stage. */
  .paper-wrap {
    position: absolute;
    left: 50%;
    top: -340px;
    transform: translateX(-50%);
    width: min(92%, 708px);
    z-index: 1;
    filter: drop-shadow(0 16px 24px rgba(30,20,5,.35));
    pointer-events: none;
  }
  .paper {
    position: relative;
    width: 100%;
    height: 380px;
    background: linear-gradient(180deg, rgba(0,0,0,.04), transparent 20%, transparent 85%, rgba(0,0,0,.02)), linear-gradient(180deg, var(--paper), var(--paper-shadow));
    border-radius: 2px 2px 0 0;
    border: 1px solid rgba(0,0,0,.08);
    border-bottom: none;
    overflow: hidden;
  }
  .paper::before {
    content: "";
    position: absolute; inset: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='300'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.7' numOctaves='2' seed='7'/><feColorMatrix values='0 0 0 0 0.35  0 0 0 0 0.27  0 0 0 0 0.15  0 0 0 .22 0'/></filter><rect width='300' height='300' filter='url(%23n)'/></svg>");
    mix-blend-mode: multiply;
    opacity: .28;
    pointer-events: none;
  }
  .sheet { position: absolute; inset: 0; padding: 28px 34px 40px; overflow: hidden; }
  .sheet-inner {
    font-family: "Special Elite", "Courier New", monospace;
    font-size: 14px;
    line-height: 24px;
    color: var(--ink);
    white-space: pre-wrap;
    word-break: break-word;
    letter-spacing: .01em;
    transform: translateY(var(--scroll, 0px));
    transition: transform .2s cubic-bezier(.4,.9,.3,1);
  }
  .sheet-inner .ch {
    display: inline-block;
    animation: stamp .14s ease-out;
  }
  @keyframes stamp {
    0% { opacity: 0; transform: translateY(-1.5px) scale(1.08); filter: blur(.4px); }
    100% { opacity: 1; transform: none; filter: blur(0); }
  }
  .cursor {
    display: inline-block; width: 8px; height: 3px; background: var(--ink);
    vertical-align: baseline; transform: translateY(3px);
    animation: blink 1.05s steps(2, end) infinite; opacity: .75;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* Machine wrapper */
  .machine {
    position: relative;
    width: 100%;
    z-index: 2;
    filter: drop-shadow(0 28px 36px rgba(20,10,0,.4));
  }
  .machine img.photo {
    width: 100%;
    display: block;
    user-select: none;
    -webkit-user-drag: none;
  }

  /* SVG overlay with clickable key-hit zones, sized to match image */
  .overlay {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  .overlay svg {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
  }
  .keyzone {
    cursor: pointer;
    pointer-events: auto;
    transform-origin: center;
    transform-box: fill-box;
    transition: transform .06s ease-out;
  }
  .keyzone circle.hit { fill: rgba(0,0,0,0); }
  .keyzone circle.cap { filter: drop-shadow(0 3px 2px rgba(0,0,0,.55)); }
  .keyzone text.label {
    font-family: "Special Elite", "Courier New", monospace;
    font-size: 22px;
    fill: #1a1410;
    text-anchor: middle;
    dominant-baseline: middle;
    pointer-events: none;
    user-select: none;
  }
  .keyzone.down { transform: translateY(3px); }
  .keyzone.down circle.cap { filter: drop-shadow(0 1px 1px rgba(0,0,0,.55)) brightness(.85); }

  .spacezone {
    cursor: pointer;
    pointer-events: auto;
    transform-origin: center;
    transform-box: fill-box;
    transition: transform .08s;
  }
  .spacezone rect.hit { fill: rgba(0,0,0,0); }
  .spacezone.down { transform: translateY(2px); }

  /* Key press highlight halo that floats over the keyzone */
  .keypress {
    position: absolute;
    pointer-events: none;
    width: 44px; height: 44px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,230,180,.7), transparent 65%);
    opacity: 0;
    transform: translate(-50%, -50%);
    mix-blend-mode: screen;
    z-index: 5;
  }

  /* Carriage shake on each keystroke, return sweep */
  .machine.shift-a { animation: shift-a .09s ease-out; }
  @keyframes shift-a { 50% { transform: translateX(-1.4px); } }
  .machine.returning { animation: retsweep .55s cubic-bezier(.2,.8,.2,1); }
  @keyframes retsweep { 20% { transform: translateX(6px); } }

  /* Bell indicator over the typewriter right side */
  .bell-ind {
    position: absolute;
    right: 4%;
    top: 20%;
    width: 6%;
    aspect-ratio: 1;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,230,170,.85), rgba(180,120,30,0) 70%);
    opacity: 0;
    pointer-events: none;
    z-index: 4;
    mix-blend-mode: screen;
  }
  .bell-ind.ring { animation: bellglow .7s ease-out; }
  @keyframes bellglow {
    0% { opacity: 0; transform: scale(.4); }
    20% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(2); }
  }

  /* Controls strip */
  .controls {
    margin: 24px auto 0;
    max-width: 760px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 28px;
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .controls .col { display: flex; gap: 16px; align-items: center; }
  .controls .col.end { justify-content: flex-end; }
  .kbd {
    display: inline-block;
    padding: 3px 7px 4px;
    border: 1px solid rgba(255, 245, 235, 0.45);
    border-radius: 3px;
    background: rgba(0, 0, 0, 0.2);
    font-family: "JetBrains Mono", monospace;
    font-size: 9px;
    line-height: 1;
    color: var(--heading);
  }
  .ctrl-btn {
    appearance: none; border: 1px solid rgba(255, 245, 235, 0.55);
    background: rgba(0, 0, 0, 0.15);
    font: inherit; text-transform: inherit; letter-spacing: inherit;
    color: var(--heading);
    padding: 8px 12px; cursor: pointer; border-radius: 2px;
  }
  .ctrl-btn:hover, .ctrl-btn.on { background: var(--heading); color: var(--bg-deep); border-color: var(--heading); }

  .stat { display: flex; flex-direction: column; align-items: center; color: var(--heading); opacity: .95; }
  .stat b { font-size: 28px; font-weight: 500; font-family: "Special Elite", monospace; letter-spacing: 0; }

  /* Tweaks panel */
  .tweaks {
    position: fixed; right: 20px; bottom: 20px; width: 280px;
    background: #fbf5e2;
    border: 1px solid rgba(0,0,0,.15);
    box-shadow: 0 20px 40px rgba(30,20,5,.35), 0 2px 6px rgba(0,0,0,.2);
    padding: 18px;
    font-family: "JetBrains Mono", monospace; font-size: 11px;
    color: var(--ink); z-index: 100; display: none; border-radius: 2px;
  }
  .tweaks.open { display: block; }
  .tweaks h4 { margin: 0 0 14px; font-size: 10px; letter-spacing: .28em; text-transform: uppercase; font-weight: 500; display: flex; justify-content: space-between; }
  .tweaks h4 span { opacity: .5; font-weight: 400; }
  .tweak-row { margin-bottom: 12px; }
  .tweak-row label { display: flex; justify-content: space-between; font-size: 9px; letter-spacing: .18em; text-transform: uppercase; opacity: .7; margin-bottom: 6px; }
  .tweak-row input[type=range] { width: 100%; accent-color: var(--ink); }
  .seg { display: grid; grid-auto-flow: column; grid-auto-columns: 1fr; border: 1px solid rgba(0,0,0,.3); border-radius: 2px; overflow: hidden; }
  .seg button { appearance: none; border: none; background: transparent; font: inherit; padding: 6px 4px; cursor: pointer; letter-spacing: .12em; text-transform: uppercase; font-size: 9px; border-right: 1px solid rgba(0,0,0,.2); color: var(--ink); }
  .seg button:last-child { border-right: none; }
  .seg button.on { background: var(--ink); color: var(--paper); }

  body[data-ribbon="red"] .sheet-inner .ch.red { color: var(--ribbon-red); }

  .share-toast {
    position: fixed; left: 50%; bottom: 88px; transform: translateX(-50%);
    font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: .2em; text-transform: uppercase;
    background: var(--heading); color: var(--bg-deep); padding: 10px 18px; border-radius: 2px;
    opacity: 0; pointer-events: none; z-index: 120; transition: opacity .35s;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
  }
  .share-toast.show { opacity: 1; }

  /* Shared note view: paper only */
  body.read-only-note .page-title,
  body.read-only-note .machine,
  body.read-only-note .controls,
  body.read-only-note .tweaks,
  body.read-only-note #hint,
  body.read-only-note #catcher { display: none !important; }

  body.read-only-note .scene { padding: 48px 24px 80px; max-width: 900px; }
  body.read-only-note .stage {
    width: min(720px, 100%);
    margin-top: 0;
    min-height: 60vh;
  }
  body.read-only-note .paper-wrap {
    position: relative;
    left: auto;
    top: auto;
    transform: none;
    width: 100%;
    max-width: 100%;
    margin: 0 auto;
    pointer-events: auto;
  }
  body.read-only-note .paper {
    height: min(70vh, 560px);
    border-bottom: 1px solid rgba(0, 0, 0, 0.08);
  }
  body.read-only-note .cursor { display: none !important; }
  body.read-only-note { cursor: default; }

  #catcher { position: absolute; left: -9999px; width: 1px; height: 1px; opacity: 0; }

  .hint {
    position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%);
    font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: .28em; text-transform: uppercase;
    background: var(--ink); color: var(--paper); padding: 10px 16px; border-radius: 2px;
    opacity: 0; transition: opacity .4s; pointer-events: none; z-index: 50;
    box-shadow: 0 8px 20px rgba(0,0,0,.3);
  }
  .hint.show { opacity: 1; }

  @media (max-width: 720px) {
    .scene { padding: 24px 18px 100px; }
    .stage { margin-top: 320px; }
    .paper-wrap { width: min(94%, 100%); top: -300px; }
  }
</style>
</head>

<script>
/* =====================================================
   TWEAKS — edit mode defaults
   ===================================================== */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "paperTone": "cream",
  "ribbon": "black",
  "keyAction": "crisp",
  "volume": 60,
  "bellColumn": 52
}/*EDITMODE-END*/;

const state = { ...TWEAK_DEFAULTS, soundOn: true };

/* =====================================================
   KEY OVERLAY — positions calibrated to photo (1536x1024)
   Keyboard deck in the image: approx x 390..1145, y 410..590
   Four rows, slightly staggered like a real typewriter.
   ===================================================== */
const ROWS = [
  { keys: "1234567890", y: 488, startX: 420, stepX: 74, capR: 28 },
  { keys: "QWERTYUIOP", y: 546, startX: 430, stepX: 74, capR: 28 },
  { keys: "ASDFGHJKL",  y: 604, startX: 455, stepX: 74, capR: 28 },
  { keys: "ZXCVBNM",    y: 662, startX: 495, stepX: 74, capR: 28 }
];

const keyGroup = document.getElementById('keyGroup');
const spaceGroup = document.getElementById('spaceGroup');
const keyLookup = {};
const SVGNS = 'http://www.w3.org/2000/svg';

ROWS.forEach((row) => {
  for (let i = 0; i < row.keys.length; i++) {
    const ch = row.keys[i];
    const cx = row.startX + i * row.stepX;
    const cy = row.y;

    const g = document.createElementNS(SVGNS, 'g');
    g.setAttribute('class', 'keyzone');
    g.dataset.key = ch;

    // stem (small dark rect under the cap for depth)
    const stem = document.createElementNS(SVGNS, 'rect');
    stem.setAttribute('x', cx - 12);
    stem.setAttribute('y', cy + row.capR - 6);
    stem.setAttribute('width', 24);
    stem.setAttribute('height', 14);
    stem.setAttribute('fill', '#0a0806');
    stem.setAttribute('rx', 2);
    g.appendChild(stem);

    // visible ivory cap
    const cap = document.createElementNS(SVGNS, 'circle');
    cap.setAttribute('class', 'cap');
    cap.setAttribute('cx', cx);
    cap.setAttribute('cy', cy);
    cap.setAttribute('r', row.capR);
    cap.setAttribute('fill', 'url(#capFill)');
    cap.setAttribute('stroke', '#3a3328');
    cap.setAttribute('stroke-width', '1.5');
    g.appendChild(cap);

    // inner ring (embossed look)
    const ring = document.createElementNS(SVGNS, 'circle');
    ring.setAttribute('cx', cx);
    ring.setAttribute('cy', cy);
    ring.setAttribute('r', row.capR - 5);
    ring.setAttribute('fill', 'none');
    ring.setAttribute('stroke', 'rgba(0,0,0,.2)');
    ring.setAttribute('stroke-width', '1');
    g.appendChild(ring);

    // label
    const label = document.createElementNS(SVGNS, 'text');
    label.setAttribute('class', 'label');
    label.setAttribute('x', cx);
    label.setAttribute('y', cy + 1);
    label.textContent = ch;
    g.appendChild(label);

    // transparent hit target on top
    const hit = document.createElementNS(SVGNS, 'circle');
    hit.setAttribute('class', 'hit');
    hit.setAttribute('cx', cx);
    hit.setAttribute('cy', cy);
    hit.setAttribute('r', row.capR + 2);
    g.appendChild(hit);

    g.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      handleChar(ch.toLowerCase());
    });

    keyGroup.appendChild(g);
    keyLookup[ch.toLowerCase()] = { el: g, cx, cy };
  }
});

// Space bar
{
  const g = document.createElementNS(SVGNS, 'g');
  g.setAttribute('class', 'spacezone');

  const bar = document.createElementNS(SVGNS, 'rect');
  bar.setAttribute('x', 500);
  bar.setAttribute('y', 738);
  bar.setAttribute('width', 536);
  bar.setAttribute('height', 32);
  bar.setAttribute('rx', 6);
  bar.setAttribute('fill', '#c8c2b3');
  bar.setAttribute('stroke', '#3a3328');
  bar.setAttribute('stroke-width', '1.5');
  bar.style.filter = 'drop-shadow(0 3px 2px rgba(0,0,0,.55))';
  g.appendChild(bar);

  const gloss = document.createElementNS(SVGNS, 'rect');
  gloss.setAttribute('x', 504);
  gloss.setAttribute('y', 742);
  gloss.setAttribute('width', 528);
  gloss.setAttribute('height', 6);
  gloss.setAttribute('rx', 3);
  gloss.setAttribute('fill', 'rgba(255,255,255,.35)');
  g.appendChild(gloss);

  const hit = document.createElementNS(SVGNS, 'rect');
  hit.setAttribute('class', 'hit');
  hit.setAttribute('x', 495);
  hit.setAttribute('y', 730);
  hit.setAttribute('width', 546);
  hit.setAttribute('height', 48);
  hit.setAttribute('rx', 8);
  hit.setAttribute('fill', 'rgba(0,0,0,0)');
  g.appendChild(hit);

  g.addEventListener('pointerdown', (e) => { e.preventDefault(); ensureAudio(); typeSpace(); });
  spaceGroup.appendChild(g);
  window._spaceEl = g;
}

/* =====================================================
   WEB AUDIO — synthesize typewriter sounds
   ===================================================== */
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
let noiseBuffer = null;
function getNoiseBuffer(ctx) {
  if (noiseBuffer) return noiseBuffer;
  const sr = ctx.sampleRate, len = sr * 0.25;
  const buf = ctx.createBuffer(1, len, sr);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  noiseBuffer = buf;
  return buf;
}
function vol() { return state.soundOn ? (state.volume / 100) : 0; }

function playClack(variation = 0) {
  if (!state.soundOn) return;
  const ctx = ensureAudio(), now = ctx.currentTime, v = vol();

  const noise = ctx.createBufferSource();
  noise.buffer = getNoiseBuffer(ctx);
  const nFilt = ctx.createBiquadFilter();
  nFilt.type = 'bandpass';
  nFilt.frequency.value = 1600 + variation * 120 + (Math.random()*400 - 200);
  nFilt.Q.value = 3.5;
  const nGain = ctx.createGain();
  let decay = 0.055, peak = 0.55;
  if (state.keyAction === 'heavy') { decay = 0.085; peak = 0.75; }
  if (state.keyAction === 'soft')  { decay = 0.035; peak = 0.35; }
  nGain.gain.setValueAtTime(0, now);
  nGain.gain.linearRampToValueAtTime(peak * v, now + 0.001);
  nGain.gain.exponentialRampToValueAtTime(0.0001, now + decay);
  noise.connect(nFilt).connect(nGain).connect(ctx.destination);
  noise.start(now); noise.stop(now + decay + 0.02);

  const osc = ctx.createOscillator();
  osc.type = 'square';
  osc.frequency.setValueAtTime(140 + variation * 6 + Math.random()*25, now);
  osc.frequency.exponentialRampToValueAtTime(70, now + 0.04);
  const oFilt = ctx.createBiquadFilter();
  oFilt.type = 'lowpass'; oFilt.frequency.value = 900;
  const oGain = ctx.createGain();
  oGain.gain.setValueAtTime(0, now);
  oGain.gain.linearRampToValueAtTime(0.18 * v, now + 0.002);
  oGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.06);
  osc.connect(oFilt).connect(oGain).connect(ctx.destination);
  osc.start(now); osc.stop(now + 0.08);

  const tick = ctx.createOscillator();
  tick.type = 'triangle';
  tick.frequency.setValueAtTime(2800 + Math.random()*400, now);
  const tG = ctx.createGain();
  tG.gain.setValueAtTime(0, now);
  tG.gain.linearRampToValueAtTime(0.12 * v, now + 0.001);
  tG.gain.exponentialRampToValueAtTime(0.0001, now + 0.02);
  tick.connect(tG).connect(ctx.destination);
  tick.start(now); tick.stop(now + 0.03);
}

function playSpace() {
  if (!state.soundOn) return;
  const ctx = ensureAudio(), now = ctx.currentTime, v = vol();
  const noise = ctx.createBufferSource();
  noise.buffer = getNoiseBuffer(ctx);
  const f = ctx.createBiquadFilter();
  f.type = 'lowpass'; f.frequency.value = 700;
  const g = ctx.createGain();
  g.gain.setValueAtTime(0, now);
  g.gain.linearRampToValueAtTime(0.28 * v, now + 0.002);
  g.gain.exponentialRampToValueAtTime(0.0001, now + 0.08);
  noise.connect(f).connect(g).connect(ctx.destination);
  noise.start(now); noise.stop(now + 0.12);
  const o = ctx.createOscillator();
  o.type = 'sine';
  o.frequency.setValueAtTime(90, now);
  o.frequency.exponentialRampToValueAtTime(55, now + 0.06);
  const og = ctx.createGain();
  og.gain.setValueAtTime(0, now);
  og.gain.linearRampToValueAtTime(0.22 * v, now + 0.002);
  og.gain.exponentialRampToValueAtTime(0.0001, now + 0.09);
  o.connect(og).connect(ctx.destination);
  o.start(now); o.stop(now + 0.1);
}
function playBell() {
  if (!state.soundOn) return;
  const ctx = ensureAudio(), now = ctx.currentTime, v = vol();
  [1760, 2637, 3520].forEach((f, i) => {
    const o = ctx.createOscillator(); o.type='sine'; o.frequency.value=f;
    const g = ctx.createGain();
    const amp = (0.22 / (i+1)) * v;
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(amp, now + 0.003);
    g.gain.exponentialRampToValueAtTime(0.0001, now + 1.1);
    o.connect(g).connect(ctx.destination);
    o.start(now); o.stop(now + 1.2);
  });
}
function playReturn() {
  if (!state.soundOn) return;
  const ctx = ensureAudio(), now = ctx.currentTime, v = vol();
  const noise = ctx.createBufferSource();
  noise.buffer = getNoiseBuffer(ctx);
  const f = ctx.createBiquadFilter();
  f.type = 'bandpass'; f.frequency.value = 1400; f.Q.value = 1.2;
  const g = ctx.createGain();
  g.gain.setValueAtTime(0, now);
  g.gain.linearRampToValueAtTime(0.35 * v, now + 0.05);
  g.gain.linearRampToValueAtTime(0.3 * v, now + 0.3);
  g.gain.exponentialRampToValueAtTime(0.0001, now + 0.45);
  noise.connect(f).connect(g).connect(ctx.destination);
  noise.start(now); noise.stop(now + 0.5);
  setTimeout(() => {
    const t = audioCtx.currentTime;
    const o = audioCtx.createOscillator(); o.type='triangle';
    o.frequency.setValueAtTime(180, t);
    o.frequency.exponentialRampToValueAtTime(80, t + 0.06);
    const og = audioCtx.createGain();
    og.gain.setValueAtTime(0, t);
    og.gain.linearRampToValueAtTime(0.45 * v, t + 0.002);
    og.gain.exponentialRampToValueAtTime(0.0001, t + 0.12);
    o.connect(og).connect(audioCtx.destination);
    o.start(t); o.stop(t + 0.14);
  }, 380);
}
function playBackspace() {
  if (!state.soundOn) return;
  const ctx = ensureAudio(), now = ctx.currentTime, v = vol();
  const o = ctx.createOscillator(); o.type='square';
  o.frequency.setValueAtTime(220, now);
  const g = ctx.createGain();
  g.gain.setValueAtTime(0, now);
  g.gain.linearRampToValueAtTime(0.15 * v, now + 0.002);
  g.gain.exponentialRampToValueAtTime(0.0001, now + 0.05);
  o.connect(g).connect(ctx.destination);
  o.start(now); o.stop(now + 0.06);
}

/* =====================================================
   TYPE ENGINE
   ===================================================== */
function utf8ToB64(str) {
  return btoa(unescape(encodeURIComponent(str)));
}
function b64ToUtf8(str) {
  return decodeURIComponent(escape(atob(str)));
}

const sheet = document.getElementById('sheet');
const cursor = document.getElementById('cursor');
const machine = document.getElementById('machine');
const kp = document.getElementById('kp');
const bellInd = document.getElementById('bellInd');
const wcEl = document.getElementById('wc');

let text = "";
let readOnlyNote = false;
(function initSharedNoteFromUrl() {
  const raw = new URLSearchParams(window.location.search || '').get('n');
  if (!raw) return;
  try {
    text = b64ToUtf8(raw);
    readOnlyNote = true;
    document.body.classList.add('read-only-note');
    document.title = 'A note for you';
  } catch (_) { /* invalid share payload */ }
})();

let columnInLine = 0;
let hasBelledThisLine = false;
const LINE_PX = 24;
const LINES_BEFORE_SCROLL = 6;

function renderSheet() {
  const frag = document.createDocumentFragment();
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (c === '\n') { frag.appendChild(document.createElement('br')); continue; }
    const s = document.createElement('span');
    s.className = 'ch' + (state.ribbon === 'red' && Math.random() < 0.08 ? ' red' : '');
    const tx = (Math.random() * 1.2 - 0.6).toFixed(2);
    const ty = (Math.random() * 1.2 - 0.6).toFixed(2);
    const rot = (Math.random() * 2 - 1).toFixed(2);
    s.style.transform = `translate(${tx}px, ${ty}px) rotate(${rot}deg)`;
    if (state.ribbon === 'faded' && Math.random() < 0.15) s.style.opacity = (0.45 + Math.random()*0.35).toFixed(2);
    s.textContent = c === ' ' ? '\u00A0' : c;
    frag.appendChild(s);
  }
  sheet.innerHTML = '';
  sheet.appendChild(frag);
  if (!readOnlyNote) sheet.appendChild(cursor);
  const words = text.trim().length ? text.trim().split(/\s+/).length : 0;
  wcEl.textContent = words;
}
function updateScroll() {
  const newlines = (text.match(/\n/g) || []).length;
  const scroll = Math.max(0, newlines - LINES_BEFORE_SCROLL + 1);
  sheet.style.setProperty('--scroll', `${-scroll * LINE_PX}px`);
}

function flashKey(ch) {
  const k = keyLookup[ch.toLowerCase()];
  if (!k) return;
  k.el.classList.add('down');
  setTimeout(() => k.el.classList.remove('down'), 90);

  const mRect = machine.getBoundingClientRect();
  const scaleX = mRect.width / 1536;
  const scaleY = mRect.height / 1024;
  kp.style.left = (k.cx * scaleX) + 'px';
  kp.style.top  = (k.cy * scaleY) + 'px';
  kp.animate(
    [ { opacity: 0.9, transform: 'translate(-50%,-50%) scale(.5)' },
      { opacity: 0, transform: 'translate(-50%,-50%) scale(1.5)' } ],
    { duration: 280, easing: 'ease-out' }
  );
}
function shake() {
  machine.classList.remove('shift-a'); void machine.offsetWidth;
  machine.classList.add('shift-a');
}
function ringBell() {
  bellInd.classList.remove('ring'); void bellInd.offsetWidth;
  bellInd.classList.add('ring');
  playBell();
}

function typeChar(ch) {
  text += ch; columnInLine++;
  renderSheet(); updateScroll(); shake(); flashKey(ch);
  playClack(ch.charCodeAt(0) % 8);
  if (!hasBelledThisLine && columnInLine >= state.bellColumn) {
    hasBelledThisLine = true;
    ringBell();
  }
}
function typeSpace() {
  text += ' '; columnInLine++;
  renderSheet(); updateScroll();
  if (window._spaceEl) {
    window._spaceEl.classList.add('down');
    setTimeout(() => window._spaceEl.classList.remove('down'), 110);
  }
  shake(); playSpace();
}
function typeReturn() {
  text += '\n'; columnInLine = 0; hasBelledThisLine = false;
  renderSheet(); updateScroll();
  machine.classList.remove('returning'); void machine.offsetWidth;
  machine.classList.add('returning');
  playReturn();
}
function doBackspace() {
  if (!text.length) return;
  const removed = text[text.length - 1];
  text = text.slice(0, -1);
  if (removed === '\n') {
    const lastNl = text.lastIndexOf('\n');
    columnInLine = text.length - (lastNl + 1);
    hasBelledThisLine = columnInLine >= state.bellColumn;
  } else {
    columnInLine = Math.max(0, columnInLine - 1);
    if (columnInLine < state.bellColumn) hasBelledThisLine = false;
  }
  renderSheet(); updateScroll(); playBackspace();
}

function handleChar(ch) {
  ensureAudio();
  typeChar(ch);
}

/* =====================================================
   INPUT
   ===================================================== */
const ACCEPT = /^[A-Za-z0-9.,;:'"!?()\-–—&@#$%/*+=<>\[\]{}]$/;
window.addEventListener('keydown', (e) => {
  if (readOnlyNote) return;
  if (e.target.tagName === 'INPUT' && e.target.id !== 'catcher') return;
  ensureAudio();
  if (e.key === 'Backspace') { e.preventDefault(); doBackspace(); return; }
  if (e.key === 'Enter')     { e.preventDefault(); typeReturn(); return; }
  if (e.key === ' ')         { e.preventDefault(); typeSpace(); return; }
  if (e.key === 'Tab')       { e.preventDefault(); for (let i=0;i<4;i++) typeSpace(); return; }
  if (e.key.length === 1 && ACCEPT.test(e.key)) {
    e.preventDefault();
    typeChar(e.key);
  }
});
document.getElementById('stage').addEventListener('click', () => {
  if (readOnlyNote) return;
  ensureAudio();
  document.getElementById('catcher').focus();
  hintEl.classList.remove('show');
});
document.getElementById('catcher').addEventListener('input', (e) => {
  if (readOnlyNote) return;
  const v = e.target.value;
  if (!v) return;
  for (const c of v) {
    if (c === '\n') typeReturn();
    else if (c === ' ') typeSpace();
    else if (ACCEPT.test(c)) typeChar(c);
  }
  e.target.value = '';
});

/* Hint */
const hintEl = document.getElementById('hint');
setTimeout(() => {
  if (readOnlyNote) return;
  hintEl.classList.add('show');
  setTimeout(() => hintEl.classList.remove('show'), 2800);
}, 900);

/* Controls */
const shareBtn = document.getElementById('shareBtn');
const shareToast = document.getElementById('shareToast');
shareBtn.addEventListener('click', async () => {
  const u = new URL(window.location.href);
  u.search = '';
  u.hash = '';
  u.searchParams.set('n', utf8ToB64(text));
  const link = u.toString();
  try {
    await navigator.clipboard.writeText(link);
    shareToast.textContent = 'link copied';
    shareToast.classList.add('show');
    setTimeout(() => shareToast.classList.remove('show'), 2400);
  } catch {
    shareToast.textContent = 'copy from dialog';
    window.prompt('Copy link to your note:', link);
    shareToast.classList.remove('show');
  }
});

const soundBtn = document.getElementById('soundBtn');
soundBtn.addEventListener('click', () => {
  state.soundOn = !state.soundOn;
  soundBtn.textContent = state.soundOn ? '♪ sound: on' : '♪ sound: off';
  soundBtn.classList.toggle('on', !state.soundOn);
});
const tweaksEl = document.getElementById('tweaks');
document.getElementById('tweakBtn').addEventListener('click', () => {
  tweaksEl.classList.toggle('open');
});

/* TWEAKS */
function applyTweaks() {
  const paperMap = {
    cream:  { bg: '#f4ebd6', bg2: '#d9ccac' },
    white:  { bg: '#fafaf4', bg2: '#eeeee4' },
    manila: { bg: '#e8d3a3', bg2: '#dcbf83' },
    onion:  { bg: '#f5f1e4', bg2: '#e5ddc6' },
  };
  const p = paperMap[state.paperTone] || paperMap.cream;
  document.documentElement.style.setProperty('--paper', p.bg);
  document.documentElement.style.setProperty('--paper-shadow', p.bg2);
  document.body.setAttribute('data-ribbon', state.ribbon);
  document.getElementById('paperVal').textContent = state.paperTone;
  document.getElementById('ribbonVal').textContent = state.ribbon;
  document.getElementById('actionVal').textContent = state.keyAction;
  document.getElementById('volVal').textContent = state.volume;
  document.getElementById('bellVal').textContent = state.bellColumn;
  document.getElementById('volRange').value = state.volume;
  document.getElementById('bellRange').value = state.bellColumn;
  document.querySelectorAll('#paperSeg button').forEach(b => b.classList.toggle('on', b.dataset.val === state.paperTone));
  document.querySelectorAll('#ribbonSeg button').forEach(b => b.classList.toggle('on', b.dataset.val === state.ribbon));
  document.querySelectorAll('#actionSeg button').forEach(b => b.classList.toggle('on', b.dataset.val === state.keyAction));
  renderSheet();
  persist();
}
function persist() {
  const edits = {};
  ['paperTone','ribbon','keyAction','volume','bellColumn'].forEach(k => edits[k] = state[k]);
  try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*'); } catch(e){}
}
function bindSeg(id, key) {
  document.getElementById(id).addEventListener('click', (e) => {
    const b = e.target.closest('button'); if (!b) return;
    state[key] = b.dataset.val; applyTweaks();
  });
}
bindSeg('paperSeg','paperTone');
bindSeg('ribbonSeg','ribbon');
bindSeg('actionSeg','keyAction');
document.getElementById('volRange').addEventListener('input', e => { state.volume = +e.target.value; document.getElementById('volVal').textContent = state.volume; persist(); });
document.getElementById('bellRange').addEventListener('input', e => { state.bellColumn = +e.target.value; document.getElementById('bellVal').textContent = state.bellColumn; persist(); });

/* Edit mode protocol */
window.addEventListener('message', e => {
  if (!e.data || !e.data.type) return;
  if (e.data.type === '__activate_edit_mode') tweaksEl.classList.add('open');
  if (e.data.type === '__deactivate_edit_mode') tweaksEl.classList.remove('open');
});
window.parent.postMessage({ type: '__edit_mode_available' }, '*');

applyTweaks();

/* Auto-seed if idle */
const SEED = "the quick brown fox jumps over the lazy dog.";
let seedI = 0, userInteracted = false;
function autoSeed() {
  if (seedI >= SEED.length || userInteracted) return;
  const c = SEED[seedI++];
  const prev = state.soundOn; state.soundOn = false;
  if (c === ' ') typeSpace();
  else if (ACCEPT.test(c)) typeChar(c);
  state.soundOn = prev;
  setTimeout(autoSeed, 60 + Math.random() * 70);
}
const markUser = () => { userInteracted = true; };
window.addEventListener('keydown', markUser, { once: true });
window.addEventListener('pointerdown', markUser, { once: true });
setTimeout(() => { if (!userInteracted && !readOnlyNote) autoSeed(); }, 1400);
</script>
